<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460">
  <rect width="400" height="460" fill="#fdfaf3"/>
  <text x="200" y="22" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="18" font-weight="bold" fill="#5a3e2b">十二经脉气血流注次序图</text>

  <circle cx="200" cy="225" r="155" fill="none" stroke="#c9b89a" stroke-width="2" stroke-dasharray="4,4"/>

  <g font-family="Microsoft YaHei,sans-serif" text-anchor="middle">
    <!-- nodes: position, fill, label -->
    <circle cx="200" cy="70" r="26" fill="#8a5a2b"/><text x="200" y="76" font-size="16" fill="#fff">肺</text>
    <circle cx="277.5" cy="90.8" r="26" fill="#8a5a2b"/><text x="277.5" y="96.8" font-size="14" fill="#fff">大肠</text>
    <circle cx="334.2" cy="147.5" r="26" fill="#8a5a2b"/><text x="334.2" y="153.5" font-size="16" fill="#fff">胃</text>
    <circle cx="355" cy="225" r="26" fill="#8a5a2b"/><text x="355" y="231" font-size="16" fill="#fff">脾</text>
    <circle cx="334.2" cy="302.5" r="26" fill="#8a5a2b"/><text x="334.2" y="308.5" font-size="16" fill="#fff">心</text>
    <circle cx="277.5" cy="359.2" r="26" fill="#8a5a2b"/><text x="277.5" y="365.2" font-size="14" fill="#fff">小肠</text>
    <circle cx="200" cy="380" r="26" fill="#8a5a2b"/><text x="200" y="386" font-size="14" fill="#fff">膀胱</text>
    <circle cx="122.5" cy="359.2" r="26" fill="#8a5a2b"/><text x="122.5" y="365.2" font-size="16" fill="#fff">肾</text>
    <circle cx="65.8" cy="302.5" r="26" fill="#8a5a2b"/><text x="65.8" y="308.5" font-size="14" fill="#fff">心包</text>
    <circle cx="45" cy="225" r="26" fill="#8a5a2b"/><text x="45" y="231" font-size="14" fill="#fff">三焦</text>
    <circle cx="65.8" cy="147.5" r="26" fill="#8a5a2b"/><text x="65.8" y="153.5" font-size="16" fill="#fff">胆</text>
    <circle cx="122.5" cy="90.8" r="26" fill="#8a5a2b"/><text x="122.5" y="96.8" font-size="16" fill="#fff">肝</text>

    <!-- order badges -->
    <g font-size="12" fill="#fff">
      <circle cx="200" cy="42" r="11" fill="#b8860b"/><text x="200" y="46">1</text>
      <circle cx="291.5" cy="66.5" r="11" fill="#b8860b"/><text x="291.5" y="70.5">2</text>
      <circle cx="358.5" cy="133.5" r="11" fill="#b8860b"/><text x="358.5" y="137.5">3</text>
      <circle cx="383" cy="225" r="11" fill="#b8860b"/><text x="383" y="229">4</text>
      <circle cx="358.5" cy="316.5" r="11" fill="#b8860b"/><text x="358.5" y="320.5">5</text>
      <circle cx="291.5" cy="383.5" r="11" fill="#b8860b"/><text x="291.5" y="387.5">6</text>
      <circle cx="200" cy="408" r="11" fill="#b8860b"/><text x="200" y="412">7</text>
      <circle cx="108.5" cy="383.5" r="11" fill="#b8860b"/><text x="108.5" y="387.5">8</text>
      <circle cx="41.5" cy="316.5" r="11" fill="#b8860b"/><text x="41.5" y="320.5">9</text>
      <circle cx="17" cy="225" r="12" fill="#b8860b"/><text x="17" y="229">10</text>
      <circle cx="41.5" cy="133.5" r="12" fill="#b8860b"/><text x="41.5" y="137.5">11</text>
      <circle cx="108.5" cy="66.5" r="12" fill="#b8860b"/><text x="108.5" y="70.5">12</text>
    </g>
  </g>

  <text x="200" y="432" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#5a3e2b">流注次序（顺时针）：肺→大肠→胃→脾→心→小肠→</text>
  <text x="200" y="450" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#5a3e2b">膀胱→肾→心包→三焦→胆→肝→复始于肺</text>
</svg>
