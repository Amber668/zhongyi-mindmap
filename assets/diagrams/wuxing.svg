<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480">
  <rect width="400" height="480" fill="#fdfaf3"/>
  <text x="200" y="26" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="18" font-weight="bold" fill="#5a3e2b">五行生克关系图</text>

  <!-- 相生 outer pentagon (solid gold) -->
  <g stroke="#b8860b" stroke-width="3" fill="none">
    <line x1="200" y1="80" x2="342.7" y2="183.7"/>
    <line x1="342.7" y1="183.7" x2="288.2" y2="351.4"/>
    <line x1="288.2" y1="351.4" x2="111.8" y2="351.4"/>
    <line x1="111.8" y1="351.4" x2="57.3" y2="183.7"/>
    <line x1="57.3" y1="183.7" x2="200" y2="80"/>
  </g>

  <!-- 相克 inner pentagram (dashed red) -->
  <g stroke="#a13d3d" stroke-width="2.5" stroke-dasharray="7,5" fill="none">
    <line x1="200" y1="80" x2="288.2" y2="351.4"/>
    <line x1="288.2" y1="351.4" x2="57.3" y2="183.7"/>
    <line x1="57.3" y1="183.7" x2="342.7" y2="183.7"/>
    <line x1="342.7" y1="183.7" x2="111.8" y2="351.4"/>
    <line x1="111.8" y1="351.4" x2="200" y2="80"/>
  </g>

  <!-- nodes -->
  <g font-family="Microsoft YaHei,sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">
    <circle cx="200" cy="80" r="34" fill="#4a8c3f"/>
    <text x="200" y="91">木</text>
    <circle cx="342.7" cy="183.7" r="34" fill="#c0392b"/>
    <text x="342.7" y="194.7">火</text>
    <circle cx="288.2" cy="351.4" r="34" fill="#c98a3b"/>
    <text x="288.2" y="362.4">土</text>
    <circle cx="111.8" cy="351.4" r="34" fill="#b8975c"/>
    <text x="111.8" y="362.4">金</text>
    <circle cx="57.3" cy="183.7" r="34" fill="#2c5f8a"/>
    <text x="57.3" y="194.7">水</text>
  </g>

  <!-- legend -->
  <line x1="60" y1="410" x2="100" y2="410" stroke="#b8860b" stroke-width="3"/>
  <text x="108" y="415" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#5a3e2b">相生：木→火→土→金→水→木</text>
  <line x1="60" y1="440" x2="100" y2="440" stroke="#a13d3d" stroke-width="2.5" stroke-dasharray="7,5"/>
  <text x="108" y="445" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#5a3e2b">相克：木克土／土克水／水克火／火克金／金克木</text>
</svg>
